bridge:
  domain: "${MATRIX_DOMAIN}"
  url: "${MATRIX_URL}"
  mediaUrl: "${MATRIX_URL}"
  port: ${BRIDGE_PORT:-9993}
  bindAddress: "${BRIDGE_BIND_ADDRESS:-0.0.0.0}"
  as_token: "xCQMUY7OiTqdXFTLP++kbErFIQR4E70ZQgwGNk+UEx8="
  hs_token: "Z3v5i7o+TyUuQgVBK+xWQFqnngFJBjuc8Gct1w65wcA="
  userId: "${MATRIX_USER_ID}"
  auto_join_rooms: true

logging:
  level: info
  colorize: false

passFile: /data/passkey.pem

# Cache configuration (optional - for production, add Redis to Railway)
# Remove this section or set up a Redis service for distributed caching
# cache:
#   redisUri: redis://localhost:6379

listeners:
  - port: 9001
    bindAddress: 0.0.0.0
    resources:
      - appservice
      - webhooks
      - widgets
  - port: 9002
    bindAddress: 0.0.0.0
    resources:
      - metrics

permissions:
  "@rathdev:synapse-production-ea3f.up.railway.app": admin
  "synapse-production-ea3f.up.railway.app": user
  "*": none

generic:
  enabled: true
  urlPrefix: "${WEBHOOK_URL_PREFIX}"
  allowJsTransformationFunctions: true
  waitForComplete: true

widgets:
  publicUrl: "${WIDGET_PUBLIC_URL}"
  roomSetupWidget:
    addOnInvite: true
  branding:
    widgetTitle: Hookshot Configuration
  # openIdOverrides:
  #   "synapse-production-ea3f.up.railway.app": "https://synapse-production-ea3f.up.railway.app"
