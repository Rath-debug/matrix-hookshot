bridge:
  domain: "${MATRIX_DOMAIN}"
  port: 9994
  url: "${MATRIX_URL}"
  bindAddress: 0.0.0.0
  as_token: "${AS_TOKEN}"
  hs_token: "${HS_TOKEN}"
  userId: "${MATRIX_USER_ID}"
  auto_join_rooms: true

logging:
  level: info
  colorize: false

passFile: /data/passkey.pem

# Cache configuration (optional - for production, add Redis to Railway)
# Remove this section or set up a Redis service for distributed caching
# cache:
#   redisUri: redis://localhost:6379

listeners:
  - port: 9993
    bindAddress: 0.0.0.0
    resources:
      - appservice
  - port: 9000
    bindAddress: 0.0.0.0
    resources:
      - webhooks
      - widgets

# permissions:
#   - actor: "@rathdev:synapse-production-ea3f.up.railway.app"
#     services:
#       - service: "*"
#         level: admin
#   - actor: "synapse-production-ea3f.up.railway.app"
#     services:
#       - service: "*"
#         level: commands

generic:
  enabled: true
  allowJsTransformationFunctions: true
  urlPrefix: "${WEBHOOK_URL_PREFIX}"
  enableHttpGet: true

widgets:
  enabled: true
  addToRooms: true
  publicUrl: "${WIDGET_PUBLIC_URL}"
  roomSetupWidget:
    addOnInvite: true
  branding:
    widgetTitle: Hookshot Configuration
  openIdOverrides:
    "synapse-production-ea3f.up.railway.app": "https://synapse-production-ea3f.up.railway.app"
