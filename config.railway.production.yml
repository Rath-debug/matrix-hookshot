bridge:
  domain: "${MATRIX_DOMAIN}"
  url: "${MATRIX_URL}"
  mediaUrl: "${MATRIX_URL}"
  port: ${BRIDGE_PORT:-9993}
  bindAddress: "${BRIDGE_BIND_ADDRESS:-0.0.0.0}"
  as_token: "${MATRIX_AS_TOKEN}"
  hs_token: "${MATRIX_HS_TOKEN}"
  userId: "${MATRIX_USER_ID}"

logging:
  level: info
  colorize: false

passFile: /data/passkey.pem

cache:
  redisUri: redis://localhost:6379

listeners:
  - port: 9001
    bindAddress: 0.0.0.0
    resources:
      - webhooks
      - widgets
  - port: 9002
    bindAddress: 0.0.0.0
    resources:
      - metrics

generic:
  enabled: true
  urlPrefix: "${WEBHOOK_URL_PREFIX}"
  allowJsTransformationFunctions: true
  waitForComplete: true

widgets:
  publicUrl: "${WIDGET_PUBLIC_URL}"
  roomSetupWidget:
    addOnInvite: true
  branding:
    widgetTitle: Hookshot Configuration
  openIdOverrides:
    "synapse-production-ea3f.up.railway.app": "https://synapse-production-ea3f.up.railway.app"
